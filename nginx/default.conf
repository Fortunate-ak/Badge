server {
    listen 8084;
    server_name _;

    # Serve static files directly
    location /static/ {
        alias /app/staticfiles/;  # Match Django's STATIC_ROOT
        expires 30d;  # Cache static files
        add_header Cache-Control "public, no-transform";
    }

    # Serve uploaded media files — NO CACHING
    location /media/ {
        alias /app/mediafiles/;    # must match docker-compose mount path
        # Turn off nginx 'expires' handling
        expires off;

        # Tell clients and intermediate caches not to store the response
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";

        # Prevent content sniffing (recommended)
        add_header X-Content-Type-Options nosniff;

        # Optional - ensure nginx doesn't set an internal cache lifetime
        # (useful when using proxy or fastcgi; harmless for file serving)
        add_header X-Accel-Expires 0;
    }


    # Proxy backend-managed paths to Django
    # These are the routes you specified to be handled by the backend:
    location ^~ /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /accounts/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /dev/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: proxy API under /api/ to Django too
    location ^~ /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy websocket requests for Vite HMR to the vite dev server
    location /@vite/ {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy websocket HMR endpoint (vite)
    location /sockjs-node {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else: forward to frontend dev server (Vite)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow websockets and keepalive for HMR:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Define connection_upgrade mapping outside server block
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
